# netlify.toml — Configuración do sitio NaturezaViva en Netlify

[build]
  # Cartafol raíz que se publicará
  publish = "."

# Cabeceiras de seguridade para todas as páxinas
[[headers]]
  for = "/*"
  [headers.values]
    X-Frame-Options = "DENY"
    X-XSS-Protection = "1; mode=block"
    X-Content-Type-Options = "nosniff"
    Referrer-Policy = "strict-origin-when-cross-origin"
    Permissions-Policy = "camera=(), microphone=(), geolocation=()"

# Cache para recursos estáticos (CSS e JS)
[[headers]]
  for = "/css/*"
  [headers.values]
    Cache-Control = "public, max-age=31536000, immutable"

[[headers]]
  for = "/js/*"
  [headers.values]
    Cache-Control = "public, max-age=31536000, immutable"

# Redirección de exemplo: URL antiga → nova
[[redirects]]
  from = "/inicio"
  to = "/"
  status = 301
  force = false
